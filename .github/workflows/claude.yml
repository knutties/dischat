name: Claude respond (reusable)

# Reusable workflow that responds to "@claude" in GitHub Discussions.
#
# Call from another repo like this (.github/workflows/claude.yml in the
# caller, with an `ANTHROPIC_API_KEY` repo secret set):
#
#   name: Claude in discussions
#   on:
#     discussion:
#       types: [created]
#     discussion_comment:
#       types: [created]
#   permissions:
#     discussions: write
#     contents: read
#   jobs:
#     claude:
#       uses: knutties/dischat/.github/workflows/claude.yml@main
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

on:
  workflow_call:
    inputs:
      model:
        description: Anthropic model id.
        type: string
        required: false
        default: claude-opus-4-7
      max-tokens:
        description: Max tokens for Claude's reply.
        type: number
        required: false
        default: 4096
      trigger:
        description: Substring that must appear in the comment / discussion body to trigger a response.
        type: string
        required: false
        default: '@claude'
    secrets:
      ANTHROPIC_API_KEY:
        description: Anthropic API key. Get one at https://console.anthropic.com/.
        required: true

# The caller's workflow must also grant these scopes — reusable workflows
# can't widen the caller's GITHUB_TOKEN permissions.
permissions:
  discussions: write
  contents: read

jobs:
  respond:
    runs-on: ubuntu-latest
    # Skip if the event was caused by a bot (avoids loops where Claude's own
    # reply re-triggers the workflow).
    if: ${{ github.event.sender.type != 'Bot' }}
    steps:
      # The responder script lives in knutties/dischat — check it out here
      # so callers don't need to vendor anything.
      - name: Check out responder script
        uses: actions/checkout@v4
        with:
          repository: knutties/dischat
          ref: main
          path: dischat-responder

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run responder
        working-directory: dischat-responder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          MODEL: ${{ inputs.model }}
          MAX_TOKENS: ${{ inputs.max-tokens }}
          TRIGGER: ${{ inputs.trigger }}
        run: node .github/scripts/claude-respond.js
